<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konr Larson | Spire3D</title>
    <style>
        :root {
            --dark-blue: #0b0d17;
            --accent-purple: #7b4397;
            --accent-cyan: #00d2ff;
            --text-light: #f3f4f6;
            --card-bg: #161b33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .vcard {
            background: linear-gradient(145deg, var(--card-bg), #0b0d17);
            width: 100%;
            max-width: 380px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            position: relative;
        }

        .header-bg {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            height: 100px;
            width: 100%;
        }

        .logo-container { margin-top: -60px; position: relative; }

        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid var(--dark-blue);
            background: #000;
            object-fit: cover;
        }

        .content { padding: 20px 25px 35px; }

        h1 { font-size: 1.8rem; margin-bottom: 5px; }
        
        .job-title {
            color: var(--accent-cyan);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
        }

        .contact-link {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            color: white;
            text-decoration: none;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.2s;
        }

        .contact-link:active { background: rgba(255, 255, 255, 0.1); }

        .icon { font-size: 1.3rem; margin-right: 15px; width: 30px; }
        .label { font-size: 0.75rem; color: #9ca3af; display: block; text-align: left; }
        .value { display: block; text-align: left; font-weight: 500; }

        .save-btn {
            display: block;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .footer-tag {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #4b5563;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="vcard">
        <div class="header-bg"></div>
        <div class="logo-container">
            <img src=https://qr.view.page/uploads/vcard/qR6QFj_c432b75cfe03fae8.png alt="Spire3D Logo" class="logo">
        </div>

        <div class="content">
            <h1>Konr Larson</h1>
            <p class="job-title">3D Printing Specialist</p>

            <a href="tel:5412247731" class="contact-link">
                <span class="icon">📱</span>
                <div>
                    <span class="label">Mobile</span>
                    <span class="value">(541) 224-7731</span>
                </div>
            </a>

            <a href="mailto:larsonkonr@gmail.com" class="contact-link">
                <span class="icon">✉️</span>
                <div>
                    <span class="label">Email</span>
                    <span class="value">larsonkonr@gmail.com</span>
                </div>
            </a>

            <a href="https://spire3d.com" target="_blank" class="contact-link">
                <span class="icon">🌐</span>
                <div>
                    <span class="label">Website</span>
                    <span class="value">spire3d.com</span>
                </div>
            </a>

            <a href="#" id="vcard-download" class="save-btn">SAVE CONTACT</a>

            <p class="footer-tag">INNOVATE • CREATE • PRINT</p>
        </div>
    </div>

    <script>
        // This script generates the vCard file data on the fly
        document.getElementById('vcard-download').addEventListener('click', function (e) {
            e.preventDefault();
            
            const vcardData = [
                "BEGIN:VCARD",
                "VERSION:3.0",
                "FN:Konr Larson",
                "ORG:Spire3D",
                "TITLE:3D Printing Specialist",
                "TEL;TYPE=CELL:(541) 224-7731",
                "EMAIL:larsonkonr@gmail.com",
                "URL:https://spire3d.com",
                "END:VCARD"
            ].join("\n");

            const blob = new Blob([vcardData], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const newLink = document.createElement('a');
            newLink.download = "Konr_Larson_Spire3D.vcf";
            newLink.href = url;
            newLink.click();
        });
    </script>

</body>
</html>
